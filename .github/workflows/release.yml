name: Build & Release

on:
  repository_dispatch:
    types: [trigger-release]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ════════════════════════════════════════════════════════════════════
  # Stage 1: Build all 5 Bridge binaries across platforms
  # ════════════════════════════════════════════════════════════════════
  build-bridge:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            targets: ''
          - platform: macos-latest
            targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: ubuntu-22.04
            targets: 'aarch64-unknown-linux-gnu'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: edison7009/Echobird
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ github.event.client_payload.ref }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}

      - name: Install Linux cross-compilation tools
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          rustup target add aarch64-unknown-linux-gnu

      - name: Build Bridge binaries
        shell: bash
        run: |
          cd bridge-src
          mkdir -p ../bridge-artifacts

          if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            cargo build --release
            cp target/release/echobird-bridge.exe ../bridge-artifacts/bridge-win.exe
            echo "Built: bridge-win.exe"

          elif [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            cargo build --release --target aarch64-apple-darwin
            cp target/aarch64-apple-darwin/release/echobird-bridge ../bridge-artifacts/bridge-darwin-aarch64

            cargo build --release --target x86_64-apple-darwin
            cp target/x86_64-apple-darwin/release/echobird-bridge ../bridge-artifacts/bridge-darwin-x86_64
            echo "Built: bridge-darwin-aarch64, bridge-darwin-x86_64"

          elif [[ "${{ matrix.platform }}" == "ubuntu-22.04" ]]; then
            cargo build --release
            cp target/release/echobird-bridge ../bridge-artifacts/bridge-linux-x86_64

            CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc \
              cargo build --release --target aarch64-unknown-linux-gnu
            cp target/aarch64-unknown-linux-gnu/release/echobird-bridge ../bridge-artifacts/bridge-linux-aarch64
            echo "Built: bridge-linux-x86_64, bridge-linux-aarch64"
          fi

          ls -la ../bridge-artifacts/

      - name: Upload Bridge artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bridge-${{ matrix.platform }}
          retention-days: 3
          path: bridge-artifacts/bridge-*

  # ════════════════════════════════════════════════════════════════════
  # Stage 2: Build main app (downloads ALL 5 Bridge binaries first)
  # ════════════════════════════════════════════════════════════════════
  publish-tauri:
    needs: build-bridge
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: edison7009/Echobird
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ github.event.client_payload.ref }}

      - name: Download ALL Bridge binaries from Stage 1
        uses: actions/download-artifact@v4
        with:
          pattern: bridge-*
          path: bridge-download/
          merge-multiple: true

      - name: Copy Bridge binaries to bridge/ directory
        shell: bash
        run: |
          echo "=== Downloaded Bridge binaries ==="
          ls -la bridge-download/
          cp bridge-download/bridge-* bridge/
          echo "=== bridge/ directory (all 5 platforms) ==="
          ls -la bridge/bridge-*

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install macOS DMG tools
        if: matrix.platform == 'macos-latest'
        run: brew install create-dmg

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            gcc-aarch64-linux-gnu
          rustup target add aarch64-unknown-linux-gnu

      - name: Install frontend dependencies
        run: npm install

      - name: Validate i18n files (encoding + syntax)
        shell: bash
        run: |
          node --input-type=module <<'EOF'
          import { readFileSync, readdirSync } from 'fs';
          import { join } from 'path';
          const dir = 'src/i18n';
          const files = readdirSync(dir).filter(f => f.endsWith('.ts') && f !== 'types.ts' && f !== 'index.ts');
          let errors = 0;
          for (const f of files) {
            const text = readFileSync(join(dir, f), 'utf8');
            const fffd = (text.match(/\uFFFD/g) || []).length;
            if (fffd > 0) { console.error(`FAIL ${f}: ${fffd} U+FFFD replacement chars`); errors++; }
            // Check for unterminated string lines (odd single-quote count)
            const lines = text.split('\n');
            for (let i = 0; i < lines.length; i++) {
              if (/^\s+'[^']+':/.test(lines[i])) {
                const q = (lines[i].replace(/\\'/g, '').match(/'/g) || []).length;
                if (q % 2 !== 0) { console.error(`FAIL ${f}:${i+1}: unterminated string: ${lines[i].trim().slice(0,60)}`); errors++; }
              }
            }
          }
          if (errors === 0) console.log(`✓ All ${files.length} i18n files clean`);
          else { console.error(`\n${errors} i18n error(s) found`); process.exit(1); }
          EOF

      - name: Build Tauri app (bundles bridge/ binaries via resources)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Upload app artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}-${{ strategy.job-index }}
          retention-days: 3
          path: |
            src-tauri/target/**/release/bundle/**/*.exe
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.rpm
          if-no-files-found: warn

  # ════════════════════════════════════════════════════════════════════
  # Stage 2b: Build Android APK (runs in parallel with desktop builds)
  # ════════════════════════════════════════════════════════════════════
  build-android:
    needs: build-bridge
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: edison7009/Echobird
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ github.event.client_payload.ref }}

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;27.0.12077973"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust stable with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'aarch64-linux-android'

      - name: Install frontend dependencies
        run: npm install

      - name: Install Tauri CLI (cargo binary)
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall tauri-cli -y --locked

      - name: Clean stale jniLibs symlinks
        run: rm -rf src-tauri/gen/android/app/src/main/jniLibs/

      - name: Build Android APK (arm64 release)
        run: cargo tauri android build --target aarch64 --apk

      - name: Sign APK with release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore
          APK=$(find src-tauri/gen/android -name '*.apk' -type f | head -1)
          if [ -z "$APK" ]; then
            echo "❌ No APK found to sign"
            exit 1
          fi
          SIGNED="${APK%.apk}-signed.apk"
          APKSIGNER=$(ls -1d $ANDROID_HOME/build-tools/* | tail -n 1)/apksigner
          "$APKSIGNER" sign \
            --ks /tmp/release.keystore \
            --ks-pass pass:$KEYSTORE_PASSWORD \
            --key-pass pass:$KEY_PASSWORD \
            --ks-key-alias "$KEY_ALIAS" \
            --out "$SIGNED" "$APK"
          echo "SIGNED_APK=$SIGNED" >> $GITHUB_ENV
          echo "✅ Signed: $SIGNED"

      - name: Rename and upload APK
        run: |
          mkdir -p android-artifacts
          cp "$SIGNED_APK" android-artifacts/Echobird-android-${{ github.event.client_payload.tag }}.apk
          echo "✅ Echobird-android-${{ github.event.client_payload.tag }}.apk (signed)"
          ls -la android-artifacts/

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          retention-days: 3
          path: android-artifacts/Echobird-android-*.apk

  # ════════════════════════════════════════════════════════════════════
  # Stage 3: Collect all artifacts and create draft release
  # ════════════════════════════════════════════════════════════════════
  publish-release:
    needs: [publish-tauri, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Create tag
        run: |
          git tag ${{ github.event.client_payload.tag }} || true
          git push origin ${{ github.event.client_payload.tag }} || true

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Deduplicate release assets
        run: |
          mkdir -p release-assets
          find artifacts/ -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" -o -name "*.apk" -o -name "bridge-*" \) | while read f; do
            base=$(basename "$f")
            if [ ! -f "release-assets/$base" ]; then
              cp "$f" "release-assets/$base"
              echo "✅ $base"
            else
              echo "⏭️ Skipping duplicate: $base"
            fi
          done

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.client_payload.tag }}
          name: Echobird ${{ github.event.client_payload.tag }}
          draft: false
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
