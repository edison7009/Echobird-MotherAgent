name: Build & Release

on:
  repository_dispatch:
    types: [trigger-release]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: edison7009/Echobird
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ github.event.client_payload.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install macOS DMG tools
        if: matrix.platform == 'macos-latest'
        run: brew install create-dmg

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            gcc-aarch64-linux-gnu
          rustup target add aarch64-unknown-linux-gnu

      - name: Install frontend dependencies
        run: npm install

      - name: Validate i18n files (encoding + syntax)
        shell: bash
        run: |
          node --input-type=module << 'EOF'
          import { readFileSync, readdirSync } from 'fs';
          import { join } from 'path';
          const dir = 'src/i18n';
          const files = readdirSync(dir).filter(f => f.endsWith('.ts') && f !== 'types.ts' && f !== 'index.ts');
          let errors = 0;
          for (const f of files) {
            const text = readFileSync(join(dir, f), 'utf8');
            const fffd = (text.match(/\uFFFD/g) || []).length;
            if (fffd > 0) { console.error(`FAIL ${f}: ${fffd} U+FFFD replacement chars`); errors++; }
            // Check for unterminated string lines (odd single-quote count)
            const lines = text.split('\n');
            for (let i = 0; i < lines.length; i++) {
              if (/^\s+'[^']+':/.test(lines[i])) {
                const q = (lines[i].replace(/\\'/g, '').match(/'/g) || []).length;
                if (q % 2 !== 0) { console.error(`FAIL ${f}:${i+1}: unterminated string: ${lines[i].trim().slice(0,60)}`); errors++; }
              }
            }
          }
          if (errors === 0) console.log(`✓ All ${files.length} i18n files clean`);
          else { console.error(`\n${errors} i18n error(s) found`); process.exit(1); }
          EOF

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Build bridge binary
        shell: bash
        run: |
          cd plugins/openclaw/bridge
          if [[ "${{ matrix.args }}" == *"aarch64-apple-darwin"* ]]; then
            cargo build --release --target aarch64-apple-darwin
            cp target/aarch64-apple-darwin/release/echobird-bridge ../bridge-darwin-aarch64
          elif [[ "${{ matrix.args }}" == *"x86_64-apple-darwin"* ]]; then
            cargo build --release --target x86_64-apple-darwin
            cp target/x86_64-apple-darwin/release/echobird-bridge ../bridge-darwin-x86_64
          elif [[ "${{ matrix.platform }}" == "ubuntu-22.04" ]]; then
            cargo build --release
            cp target/release/echobird-bridge ../bridge-linux-x86_64
            # Cross-compile for Linux aarch64
            CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc cargo build --release --target aarch64-unknown-linux-gnu
            cp target/aarch64-unknown-linux-gnu/release/echobird-bridge ../bridge-linux-aarch64
          elif [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            cargo build --release
            cp target/release/echobird-bridge.exe ../bridge-win.exe
          fi


      - name: Upload app artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}-${{ strategy.job-index }}
          retention-days: 3
          path: |
            src-tauri/target/**/release/bundle/**/*.exe
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.rpm
          if-no-files-found: warn

      - name: Upload plugin artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugins-${{ matrix.platform }}-${{ strategy.job-index }}
          retention-days: 3
          path: |
            plugins/openclaw/bridge-*
          if-no-files-found: warn

  publish-release:
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Create tag
        run: |
          git tag ${{ github.event.client_payload.tag }} || true
          git push origin ${{ github.event.client_payload.tag }} || true

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Deduplicate release assets
        run: |
          mkdir -p release-assets
          find artifacts/ -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" -o -name "bridge-*" \) | while read f; do
            base=$(basename "$f")
            if [ ! -f "release-assets/$base" ]; then
              cp "$f" "release-assets/$base"
              echo "✅ $base"
            else
              echo "⏭️ Skipping duplicate: $base"
            fi
          done

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.client_payload.tag }}
          name: Echobird ${{ github.event.client_payload.tag }}
          draft: true
          generate_release_notes: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
